          enable_github_action_token: true
          additional_args: "--languages=python --include-path=chart/** --exclude-path=airflow-ctl-tests/** --exclude-path=airflow-e2e-tests/** --exclude-path=docker-tests/** --exclude-path=helm-tests/** --exclude-path=kubernetes-tests/** --exclude-path=task-sdk-integration-tests/** --exclude-path=airflow-core/tests/**"
