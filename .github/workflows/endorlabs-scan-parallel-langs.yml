  scan-go-pr:
    name: "PR Scan: go"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24" # detected from existing CI workflow
      - uses: endorlabs/github-action@f46ffb04c928a9c9c356f9627bd60b710ed0963e
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: true
          enable_pr_comments: true
          github_token: ${{ secrets.GITHUB_TOKEN }}
          enable_github_action_token: true
          additional_args: "--languages=go --quick-scan"
    env:
      # Multi-go-version repo — Saber pins standard-library matching to each module's go directive.
      ENDOR_SCAN_USE_GOMOD_VERSION: "true"
  scan-go-monitor:
    name: "Monitor Scan: go"
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24" # detected from existing CI workflow
      - uses: endorlabs/github-action@f46ffb04c928a9c9c356f9627bd60b710ed0963e
        with:
          namespace: "endor-solutions-ypulse.github-ci.saber-e2e"
          scan_dependencies: true
          pr: false
          enable_github_action_token: true
          additional_args: "--languages=go"
          sarif_file: findings.sarif
          scan_github_actions: true
      - uses: github/codeql-action/upload-sarif@v4
        if: always()
        continue-on-error: true
        with:
          sarif_file: findings.sarif
          category: endorlabs-go
    env:
      # Auto-fallback safety net — if the local build fails on a runner, endorctl uses the platform's pre-computed reachability instead of failing the job. Full deep reachability is still the primary path on success.
      ENDOR_SCAN_ENABLE_PRECOMPUTED_CALLGRAPHS: "true"
      # Multi-go-version repo — Saber pins standard-library matching to each module's go directive.
      ENDOR_SCAN_USE_GOMOD_VERSION: "true"
