      # Saber detected this is a uv-managed Python project (uv.lock or [tool.uv] present).
      ENDOR_SCAN_ENABLE_UV_PACKAGE_MANAGER: "true"
  scan-python-other-pr:
    name: "PR Scan: python (other)"
    needs: detect-changes
    if: github.event_name == 'pull_request' && needs.detect-changes.outputs.python-other == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      id-token: write
      security-events: write
      pull-requests: write
