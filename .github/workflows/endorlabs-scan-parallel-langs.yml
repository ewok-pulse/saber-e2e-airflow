              - airflow-ctl/**/'**/Pipfile'
              - airflow-ctl/**/'**/Pipfile.lock'
              - airflow-ctl/**/'**/pdm.lock'
              - airflow-ctl/**/'**/uv.lock'
              - airflow-ctl/**/'**/*.py'
            python-chart:
              - chart/**/'**/requirements.txt'
