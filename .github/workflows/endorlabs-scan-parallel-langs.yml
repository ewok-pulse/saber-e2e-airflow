            python-docker-stack-docs:
              - docker-stack-docs/**/'**/requirements.txt'
              - docker-stack-docs/**/'**/pyproject.toml'
              - docker-stack-docs/**/'**/poetry.lock'
              - docker-stack-docs/**/'**/setup.py'
              - docker-stack-docs/**/'**/setup.cfg'
              - docker-stack-docs/**/'**/Pipfile'
              - docker-stack-docs/**/'**/Pipfile.lock'
              - docker-stack-docs/**/'**/pdm.lock'
              - docker-stack-docs/**/'**/uv.lock'
              - docker-stack-docs/**/'**/*.py'
            python-airflow-core:
              - airflow-core/**/'**/requirements.txt'
              - airflow-core/**/'**/pyproject.toml'
              - airflow-core/**/'**/poetry.lock'
              - airflow-core/**/'**/setup.py'
              - airflow-core/**/'**/setup.cfg'
              - airflow-core/**/'**/Pipfile'
              - airflow-core/**/'**/Pipfile.lock'
              - airflow-core/**/'**/pdm.lock'
              - airflow-core/**/'**/uv.lock'
              - airflow-core/**/'**/*.py'
            python-airflow-ctl:
              - airflow-ctl/**/'**/requirements.txt'
