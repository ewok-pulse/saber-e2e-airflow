# Regenerate this file with `saber scan repo` (point at this repo's path).
# Hand-edits will be overwritten on the next regeneration.
# ─────────────────────────────────────────────────────────────────
#
# Saber split one or more scan units to fit standard runner memory:
#   • python: 8 shards (providers, shared, dev, docker-stack-docs, airflow-core, airflow-ctl, chart, other)
#     Saber split the python scan into multiple jobs because this repo has 130
#     python root manifests — a single full-reachability scan exceeds the
#     ubuntu-latest runner memory budget. Each shard scans one top-level
#     subtree with full reachability preserved.
#
name: Endor Labs Scan
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
jobs:
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: read
    outputs:
      go: ${{ steps.filter.outputs.go }}
      java: ${{ steps.filter.outputs.java }}
      javascript-typescript: ${{ steps.filter.outputs.javascript-typescript }}
      python-providers: ${{ steps.filter.outputs.python-providers }}
      python-shared: ${{ steps.filter.outputs.python-shared }}
      python-dev: ${{ steps.filter.outputs.python-dev }}
      python-docker-stack-docs: ${{ steps.filter.outputs.python-docker-stack-docs }}
      python-airflow-core: ${{ steps.filter.outputs.python-airflow-core }}
      python-airflow-ctl: ${{ steps.filter.outputs.python-airflow-ctl }}
      python-chart: ${{ steps.filter.outputs.python-chart }}
      python-other: ${{ steps.filter.outputs.python-other }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |-
            go:
              - '**/go.mod'
              - '**/go.sum'
              - '**/*.go'
            java:
              - '**/pom.xml'
              - '**/build.gradle'
              - '**/build.gradle.kts'
              - '**/*.java'
            javascript-typescript:
              - '**/package.json'
              - '**/package-lock.json'
              - '**/yarn.lock'
              - '**/pnpm-lock.yaml'
              - '**/rush.json'
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
            python-providers:
              - providers/**/'**/requirements.txt'
              - providers/**/'**/pyproject.toml'
              - providers/**/'**/poetry.lock'
              - providers/**/'**/setup.py'
              - providers/**/'**/setup.cfg'
              - providers/**/'**/Pipfile'
              - providers/**/'**/Pipfile.lock'
              - providers/**/'**/pdm.lock'
              - providers/**/'**/uv.lock'
              - providers/**/'**/*.py'
            python-shared:
              - shared/**/'**/requirements.txt'
              - shared/**/'**/pyproject.toml'
              - shared/**/'**/poetry.lock'
              - shared/**/'**/setup.py'
              - shared/**/'**/setup.cfg'
              - shared/**/'**/Pipfile'
              - shared/**/'**/Pipfile.lock'
              - shared/**/'**/pdm.lock'
              - shared/**/'**/uv.lock'
              - shared/**/'**/*.py'
            python-dev:
              - dev/**/'**/requirements.txt'
              - dev/**/'**/pyproject.toml'
              - dev/**/'**/poetry.lock'
              - dev/**/'**/setup.py'
              - dev/**/'**/setup.cfg'
              - dev/**/'**/Pipfile'
              - dev/**/'**/Pipfile.lock'
              - dev/**/'**/pdm.lock'
